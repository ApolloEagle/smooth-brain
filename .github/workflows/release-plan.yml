name: Release Plan

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  plan:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run installer tests
        run: node scripts/test-installers.mjs

      - name: Plan release
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
        run: node scripts/plan-release.mjs --write

      - name: Check for release-plan changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update release PR
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH_NAME: release/next
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH_NAME"
          git add VERSION CHANGELOG.md README.md
          git commit -m "chore: plan next release"
          git push --force-with-lease origin "$BRANCH_NAME"

          if gh pr view "$BRANCH_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh pr edit "$BRANCH_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "chore: plan next release" \
              --body-file RELEASE_PLAN.md
          else
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base main \
              --head "$BRANCH_NAME" \
              --title "chore: plan next release" \
              --body-file RELEASE_PLAN.md
          fi
